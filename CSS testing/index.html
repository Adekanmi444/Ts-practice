<!DOCTYPE html>
<html>
<head>
    <title>Card Challenge</title>
    <style>
        /* background styling */
    body {
        background-color: rgb(234, 199, 153);
        font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
    .card {
    background: white;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    width: 300px;
    padding: 20px;
    margin: 50px auto;
    text-align: center;
}

.card img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 3px solid #f0f0f0;
}

.card button:hover {
    background-color: darkred;
    transform: scale(1.05);
    transition: all 0.3s;
}
    
    .title{
        font-style: italic;
        color: darkslategray;
    }
    .card button {
        background-color: rgb(170, 31, 31);
        padding: 10px;
        margin: auto;
    }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://th.bing.com/th/id/OIP.1kqlKUmrjFcVJXix6doWZAHaE8?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Profile" width="200px">
        <h2>Alex Morgan</h2>
        <p class="title">Frontend Developer</p>
        <p>Learning CSS one day at a time. Love building things that look good.</p>
        <button>Connect</button>
    </div>
    
</body>
</html>
